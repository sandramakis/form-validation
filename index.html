<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Side Hustle Project 1</title>
  </head>
  <body>
    <main>
      <!-- image section  -->
      <section class="image">
        <img class="logo" src="imgs/odi.png" alt="" />
      </section>

      <!-- Main section  -->

      <!-- Information Section  -->
      <section class="info">
        <section class="write-up">
          <h4>
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams.
            <br />
            Sign up now, let's started!
            <br />
            <br />
            You know you want to.
          </h4>
        </section>

        <!-- Form section -->
        <aside class="form">
          Let's do this
          <form>
            <span
              ><label for="fname" class="fname">
                FIRST NAME
                <br />
                <input type="text" name="fname" />
              </label>
              <br />

              <label for="email"
                >EMAIL
                <br />
                <input type="email" name="email" />
              </label>
              <br />

              <label for="password" id="password">
                PASSWORD
                <br />
                <input type="text" for="password" />
              </label>
              <br />
            </span>

            <span>
              <label for="lname" class="lname">
                LAST NAME
                <br />
                <input type="text" for="lname" />
              </label>
              <br />

              <label for="pnumber"
                >PHONE NUMBER
                <br />
                <input type="number" />
              </label>
              <br />

              <label for="password" id="confirm-password"
                >CONFIRM PASSWORD
                <br />
                <input type="text" />
              </label>
              <br />
            </span>
          </form>
          <span class="create-account">
            <button id="button" onclick="submit()" id="button">
              Create Account
            </button>
            <p>
              Already have an account?
              <a href="#">Log in</a>
            </p>
          </span>
        </aside>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
